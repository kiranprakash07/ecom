<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendStore | Modern E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/mixins/_grid.scss" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 tracking-wider" href="#">TRENDSTORE.</a>
            <button class="btn btn-outline-dark position-relative ms-auto" type="button" onclick="toggleCart()">
                <i class="fa-solid fa-bag-shopping fs-5"></i>
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
            </button>
        </div>
    </nav>

    <header class="bg-light text-center py-5 mb-5 border-bottom">
        <div class="container py-3">
            <h1 class="display-4 fw-extrabold text-dark mb-2">The Minimalist Collection</h1>
            <p class="lead text-muted mx-auto" style="max-width: 600px;">Carefully crafted premium essentials designed to elevates your daily uniform.</p>
        </div>
    </header>

    <main class="container mb-5">
        <div id="product-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            </div>
    </main>

    <div id="cart-overlay" class="cart-overlay d-none" onclick="toggleCart()"></div>
    
    <div id="cart-sidebar" class="cart-sidebar shadow-lg flex-column d-flex">
        <div class="p-4 border-bottom d-flex justify-between align-items-center bg-white">
            <h5 class="fw-bold mb-0">Shopping Cart</h5>
            <button type="button" class="btn-close fs-5 ms-auto" onclick="toggleCart()"></button>
        </div>
        
        <div id="cart-items" class="p-4 overflow-y-auto flex-grow-1 position-relative">
            <div id="empty-cart-msg" class="text-center text-muted py-5">
                <i class="fa-solid fa-basket-shopping fs-1 mb-3 text-opacity-25 text-secondary"></i>
                <p class="mb-0">Your shopping cart is empty.</p>
            </div>
        </div>

        <div class="p-4 border-top bg-light mt-auto">
            <div class="d-flex justify-content-between font-weight-bold fs-5 mb-3 fw-bold">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button onclick="checkout()" class="btn btn-dark w-100 py-3 fw-semibold tracking-wide">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <script src="number.js"></script>
</body>
</html>
